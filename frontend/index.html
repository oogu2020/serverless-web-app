<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEBULA · feedback 2027</title>
  <!-- Google Fonts: system fonts + futuristic variable font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) for crisp icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", "Space Grotesk", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 0% 30%, #0b0c1e 0%, #14172b 40%, #1d1f3a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
      color: #eef2fb;
      /* animated grain & floating glow */
    }

    /* hyper‑realistic animated glass orb background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(145, 110, 255, 0.35) 0%, transparent 35%),
        radial-gradient(circle at 90% 70%, rgba(72, 202, 255, 0.3) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    /* 2027 neumorphic glass panel form */
    form {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 560px;
      background: rgba(18, 22, 45, 0.68);
      backdrop-filter: blur(18px) saturate(200%);
      -webkit-backdrop-filter: blur(18px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 3.5rem 3.5rem 3rem 3rem;
      box-shadow: 
        0 30px 60px -20px rgba(0, 0, 0, 0.8),
        inset 0 1px 2px rgba(255, 255, 255, 0.12),
        inset 0 -2px 3px rgba(0, 0, 0, 0.3);
      padding: 2.8rem 2.5rem 2.5rem;
      transition: transform 0.3s ease, box-shadow 0.4s ease;
    }

    form:hover {
      box-shadow: 
        0 40px 70px -15px #2f2b75,
        inset 0 1px 3px rgba(255, 255, 255, 0.2);
      transform: scale(1.003);
    }

    /* floating label + icon grid */
    h2 {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      font-size: clamp(2rem, 7vw, 2.8rem);
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #ffffff, #bfcbff, #b1a6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    h2 i {
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.4);
      transition: 0.2s;
    }

    h2 .badge {
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: 0.4rem 1.2rem;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #cddcff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
    }

    /* input group — futuristic stacked */
    .input-group {
      margin-bottom: 1.8rem;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a7b5ff;
      margin-bottom: 0.5rem;
      margin-left: 0.3rem;
    }

    .input-group i.input-icon {
      position: absolute;
      left: 18px;
      bottom: 16px;
      font-size: 1.2rem;
      color: #7382ff;
      opacity: 0.8;
      pointer-events: none;
      z-index: 2;
      transition: 0.2s;
    }

    /* input, textarea, file – sleek glassmorphic fields */
    input, textarea, #file {
      width: 100%;
      background: rgba(8, 12, 30, 0.5);
      border: 1.5px solid rgba(135, 145, 255, 0.2);
      border-radius: 2rem;
      padding: 1rem 1.5rem 1rem 3rem;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: #f0f4ff;
      outline: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4), 0 1px 2px rgba(255,255,255,0.03);
    }

    textarea {
      padding-left: 3rem;
      min-height: 130px;
      resize: vertical;
    }

    /* file input – restyled with custom area */
    #file {
      padding: 0.9rem 1.5rem 0.9rem 3rem;
      background: rgba(8, 12, 30, 0.6);
      border-style: dashed;
      border-color: rgba(160, 180, 255, 0.4);
      color: #bcc6f0;
      cursor: pointer;
    }

    input:focus, textarea:focus, #file:focus {
      border-color: #96b0ff;
      box-shadow: 0 0 0 5px rgba(90, 130, 255, 0.2), inset 0 2px 5px #00000055;
      background: rgba(18, 25, 55, 0.8);
    }

    /* override icon position for file */
    .input-group .fa-paperclip {
      bottom: 14px;
    }

    /* button – morphic + liquid animation */
    button {
      width: 100%;
      background: linear-gradient(125deg, #2a3cff, #b155ff, #ff72b0);
      background-size: 200% 200%;
      border: none;
      padding: 1.2rem 2rem;
      margin-top: 2rem;
      border-radius: 3rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: white;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 15px 30px -10px #4626b3, 0 0 0 1px rgba(255,255,255,0.2) inset;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      animation: gradientFlow 7s infinite alternate;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 30%; }
      50% { background-position: 70% 100%; }
      100% { background-position: 0% 70%; }
    }

    button:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 28px 40px -8px #5030cc, 0 0 0 2px rgba(255, 255, 255, 0.4) inset;
    }

    button i {
      font-size: 1.4rem;
      transition: 0.2s;
    }

    button:hover i {
      transform: translateX(6px);
    }

    /* response message */
    #responseMessage {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      font-weight: 400;
      color: #b7e0ff;
      background: rgba(0, 10, 30, 0.4);
      border-radius: 100px;
      padding: 0.7rem 1.2rem;
      text-align: center;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,240,0.1);
      transition: opacity 0.3s;
      letter-spacing: 0.2px;
    }

    /* modal – next gen glass modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 2, 20, 0.7);
      backdrop-filter: blur(15px);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-content {
      max-width: 460px;
      width: 100%;
      background: rgba(25, 30, 60, 0.8);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 50px 80px -15px #000, 0 0 0 1px rgba(255,180,255,0.2) inset;
      text-align: center;
      animation: floatIn 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: scale(0.96) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-content p {
      font-size: 1.8rem;
      font-weight: 400;
      font-family: "Space Grotesk", sans-serif;
      color: white;
      margin: 1rem 0 2rem;
      text-shadow: 0 2px 10px #7766ff;
    }

    .modal-content i {
      font-size: 4rem;
      color: #b3ffaa;
      filter: drop-shadow(0 0 15px #48ffb2);
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      padding: 0.3rem;
    }

    .close {
      float: right;
      font-size: 2.8rem;
      font-weight: 300;
      line-height: 1;
      color: rgba(255, 255, 255, 0.5);
      transition: 0.2s;
      border: none;
      background: none;
      cursor: pointer;
    }

    .close:hover {
      color: white;
      transform: scale(1.2);
    }

    #modalOkayButton {
      background: linear-gradient(145deg, #b794ff, #5773ff);
      border: none;
      padding: 1rem 2.8rem;
      border-radius: 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0f20;
      letter-spacing: 1px;
      box-shadow: 0 10px 25px #2f1c73;
      transition: 0.25s;
      cursor: pointer;
      width: auto;
      display: inline-block;
      margin-top: 1rem;
      border: 1px solid rgba(255,255,255,0.3);
    }

    #modalOkayButton:hover {
      transform: scale(1.05) translateY(-3px);
      background: linear-gradient(145deg, #cdafff, #8095ff);
      box-shadow: 0 20px 30px #1d104b;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 1rem;
      font-weight: 300;
      color: rgba(220, 230, 255, 0.7);
      letter-spacing: 1px;
      z-index: 10;
      position: relative;
      backdrop-filter: blur(5px);
      padding: 0.5rem 2rem;
      border-radius: 100px;
      background: rgba(0, 0, 0, 0.2);
    }

    footer i {
      color: #ffacd5;
      margin: 0 4px;
    }

    /* responsive fine-tune */
    @media (max-width: 500px) {
      form { padding: 2rem 1.5rem; }
      h2 { font-size: 2rem; flex-wrap: wrap; }
      .badge { font-size: 0.7rem; }
    }

    /* remove default file input extra */
    input[type="file"] {
      padding-top: 0.7rem;
      padding-bottom: 0.7rem;
    }
    input[type="file"]::file-selector-button {
      display: none;
    }
  </style>
</head>
<body>

  <!-- MAIN FEEDFORM (fully functional, enhanced UI) -->
  <form id="feedbackForm" action="#" method="post" novalidate>
    <h2>
      <span>⎯ NEBULA FEED ⎯</span>
      <i class="fas fa-sparkles"></i>
      <span class="badge">v.2027</span>
    </h2>

    <!-- Name field -->
    <div class="input-group">
      <label for="name"><i class="far fa-user" style="margin-right: 6px;"></i> IDENTITY</label>
      <i class="fas fa-pen input-icon"></i>
      <input type="text" id="name" placeholder="cosmic signature" required>
    </div>

    <!-- Email field -->
    <div class="input-group">
      <label for="email"><i class="far fa-envelope" style="margin-right: 6px;"></i> QUANTUM MAIL</label>
      <i class="fas fa-at input-icon"></i>
      <input type="email" id="email" placeholder="resonance@nebula.space" required>
    </div>

    <!-- Message field -->
    <div class="input-group">
      <label for="message"><i class="far fa-comment-dots"></i> TRANSMISSION</label>
      <i class="fas fa-quote-right input-icon"></i>
      <textarea id="message" placeholder="type your message for the future ..." required></textarea>
    </div>

    <!-- File attachment (pdf only) -->
    <div class="input-group">
      <label for="file"><i class="fas fa-cloud-upload-alt"></i> ATTACH NEBULA DOC (PDF)</label>
      <i class="fas fa-paperclip input-icon"></i>
      <input type="file" id="file" accept="application/pdf">
    </div>

    <!-- Submit button with icon -->
    <button type="submit">
      <span>launch feedback</span>
      <i class="fas fa-rocket"></i>
    </button>

    <!-- inline response message (error / confirm) -->
    <p id="responseMessage"></p>
  </form>

  <!-- MODAL – polished ultra glass -->
  <div id="myModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
      <span class="close" id="modalCloseBtn" aria-label="close">&times;</span>
      <i class="fas fa-check-circle"></i>
      <p id="modalMessage">Feedback transmitted</p>
      <button id="modalOkayButton">⟲ ACKNOWLEDGE</button>
    </div>
  </div>

  <footer>
    <i class="fas fa-crown" style="opacity: 0.8;"></i>  CREATED BY KNOKOE  <i class="fas fa-gem"></i>
  </footer>

  <script>
    // --- CONFIG --- (keeping original URL pattern, ensure it's correct)
    const FEEDBACK_API_URL = "https://bcvn0umoph.execute-api.us-east-1.amazonaws.com/prod";   // REPLACE if needed (string wrapped)

    // DOM elements
    const form = document.getElementById('feedbackForm');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const messageInput = document.getElementById('message');
    const fileInput = document.getElementById('file');
    const responseMsg = document.getElementById('responseMessage');

    // modal elements
    const modal = document.getElementById('myModal');
    const modalMessage = document.getElementById('modalMessage');
    const modalOkay = document.getElementById('modalOkayButton');
    const modalClose = document.getElementById('modalCloseBtn'); // the span with class close

    // Helper: show modal with message
    function showModal(messageText) {
      modalMessage.innerText = messageText || 'Feedback submitted successfully!';
      modal.style.display = 'flex';  // using flex for centering
    }

    // Close modal & reload (preserving original behaviour)
    function closeAndReload() {
      modal.style.display = 'none';
      window.location.reload();
    }

    // Event: submit form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // basic front-end validation (just in case)
      if (!nameInput.value.trim() || !emailInput.value.trim() || !messageInput.value.trim()) {
        responseMsg.innerText = '🛸 all fields required (name, email, message)';
        responseMsg.style.color = '#ffb0b0';
        return;
      }

      // email quick test (optional but friendly)
      if (!emailInput.value.includes('@') || !emailInput.value.includes('.')) {
        responseMsg.innerText = '⚠️ enter a valid email dimension';
        responseMsg.style.color = '#ffb0b0';
        return;
      }

      // clear any old response
      responseMsg.innerText = '⏱️ transmitting...';
      responseMsg.style.color = '#b7e0ff';

      const name = nameInput.value;
      const email = emailInput.value;
      const message = messageInput.value;
      const file = fileInput.files[0];

      // FileReader promise for base64 if file exists
      if (file) {
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64Data = ev.target.result.split(',')[1]; // strip mime
          await submitFeedback(name, email, message, base64Data);
        };
        reader.onerror = () => {
          responseMsg.innerText = 'file read error';
        };
        reader.readAsDataURL(file);
      } else {
        await submitFeedback(name, email, message, null);
      }
    });

    // API submit function
    async function submitFeedback(name, email, message, fileBase64) {
      try {
        const payload = {
          name: name,
          email: email,
          message: message,
          file_base64: fileBase64   // can be null
        };

        const res = await fetch(FEEDBACK_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();   // expecting json with .message
        const successMsg = data.message || '✨ Feedback received by nebula core';
        responseMsg.innerText = successMsg;
        responseMsg.style.color = '#a3ffb4';
        showModal(successMsg);
      } catch (error) {
        console.error(error);
        responseMsg.innerText = '💥 submission failed. try again later.';
        responseMsg.style.color = '#ff8a9f';
        showModal('Submission failed. Please retry.');
      }
    }

    // Modal close handlers (same as original, but using both close buttons + overlay)
    modalOkay.onclick = function() {
      closeAndReload();
    };

    // Close button (X)
    if (modalClose) {
      modalClose.onclick = function() {
        closeAndReload();
      };
    }

    // Click outside modal content -> reload (consistent)
    window.onclick = function(event) {
      if (event.target === modal) {
        closeAndReload();
      }
    };

    // Also handle escape key for modal (optional UX)
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal.style.display === 'flex') {
        closeAndReload();
      }
    });
  </script>
</body>
</html>
